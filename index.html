<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBARankPro - 现役NBA球员综合实力排名</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16162a;
            --accent-primary: #00d4ff;
            --accent-secondary: #ff6b35;
            --accent-success: #00ff88;
            --accent-warning: #ffd93d;
            --text-primary: #ffffff;
            --text-secondary: #8a8a9a;
            --text-muted: #5a5a6a;
            --border-color: #2a2a3e;
            --card-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
            --glow-effect: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 20px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 6px;
            border-radius: 12px;
        }

        .nav-tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: transparent;
            font-size: 14px;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: rgba(0, 212, 255, 0.1);
        }

        .nav-tab.active {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }

        /* Filter Bar */
        .filter-bar {
            background: var(--bg-secondary);
            padding: 16px 24px;
            border-radius: 16px;
            margin: 24px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            min-width: 140px;
            transition: all 0.3s ease;
        }

        .filter-select:hover, .filter-select:focus {
            border-color: var(--accent-primary);
            outline: none;
        }

        .filter-actions {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            box-shadow: var(--glow-effect);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
        }

        /* Player List */
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 100px;
        }

        .player-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: 60px 1fr 200px 120px;
            gap: 20px;
            align-items: center;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-card:hover {
            transform: translateX(8px);
            border-color: var(--accent-primary);
            box-shadow: var(--card-shadow);
        }

        .player-card:hover::before {
            opacity: 1;
        }

        .player-card.in-favorites {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.05), var(--bg-secondary));
        }

        .player-rank {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
        }

        .rank-1 { color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .rank-2 { color: #c0c0c0; text-shadow: 0 0 20px rgba(192, 192, 192, 0.5); }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 20px rgba(205, 127, 50, 0.5); }

        .player-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player-avatar {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--border-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-primary);
            border: 2px solid var(--border-color);
        }

        .player-details h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .player-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .player-team {
            color: var(--accent-primary);
            font-weight: 500;
        }

        .player-position {
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .player-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            width: 50px;
        }

        .stat-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .stat-fill.offense { background: linear-gradient(90deg, var(--accent-secondary), #ff8f5a); }
        .stat-fill.defense { background: linear-gradient(90deg, var(--accent-primary), #5ae0ff); }
        .stat-fill.playmaking { background: linear-gradient(90deg, var(--accent-success), #5aff9e); }

        .stat-value {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            width: 30px;
            text-align: right;
        }

        .player-score {
            text-align: center;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: var(--accent-primary);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .score-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .icon-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--accent-secondary);
            color: white;
        }

        .modal-body {
            padding: 24px;
        }

        /* Radar Chart */
        .radar-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .radar-chart {
            width: 300px;
            height: 300px;
        }

        .radar-legend {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .legend-item {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .legend-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .legend-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        .legend-value.offense { color: var(--accent-secondary); }
        .legend-value.defense { color: var(--accent-primary); }
        .legend-value.playmaking { color: var(--accent-success); }
        .legend-value.physical { color: var(--accent-warning); }
        .legend-value.bbiq { color: #b388ff; }

        /* Comparison View */
        .comparison-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .comparison-player {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid var(--border-color);
            position: relative;
        }

        .comparison-player.selected {
            border-color: var(--accent-primary);
            box-shadow: var(--glow-effect);
        }

        .comparison-rank {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-primary);
            color: var(--bg-primary);
            padding: 4px 16px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
        }

        .comparison-name {
            font-size: 18px;
            font-weight: 700;
            margin: 16px 0 8px;
        }

        .comparison-team {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .comparison-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-primary);
        }

        /* Weight Sliders */
        .weight-section {
            margin-top: 24px;
        }

        .weight-grid {
            display: grid;
            gap: 20px;
        }

        .weight-category {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 12px;
        }

        .weight-category-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weight-category-title.offense { color: var(--accent-secondary); }
        .weight-category-title.defense { color: var(--accent-primary); }
        .weight-category-title.playmaking { color: var(--accent-success); }
        .weight-category-title.physical { color: var(--accent-warning); }
        .weight-category-title.bbiq { color: #b388ff; }

        .weight-sliders {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .weight-slider-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .weight-slider-label {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .weight-slider {
            -webkit-appearance: none;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            outline: none;
        }

        .weight-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .weight-presets {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 10px 20px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .preset-btn:hover {
            border-color: var(--accent-primary);
        }

        .preset-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 24px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-secondary);
            border: 1px solid var(--accent-success);
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            color: var(--accent-success);
        }

        /* Position Badge Colors */
        .position-PG { background: #3b82f6; }
        .position-SG { background: #8b5cf6; }
        .position-SF { background: #ec4899; }
        .position-PF { background: #f59e0b; }
        .position-C { background: #10b981; }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 16px;
            }

            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-actions {
                margin-left: 0;
                justify-content: center;
            }

            .player-card {
                grid-template-columns: 50px 1fr;
                gap: 12px;
            }

            .player-stats, .player-score {
                display: none;
            }

            .radar-container {
                flex-direction: column;
                align-items: center;
            }

            .radar-legend {
                grid-template-columns: 1fr;
            }
        }

        /* Section Headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 16px;
        }

        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-card {
            animation: fadeInUp 0.4s ease forwards;
        }

        .player-card:nth-child(1) { animation-delay: 0.05s; }
        .player-card:nth-child(2) { animation-delay: 0.1s; }
        .player-card:nth-child(3) { animation-delay: 0.15s; }
        .player-card:nth-child(4) { animation-delay: 0.2s; }
        .player-card:nth-child(5) { animation-delay: 0.25s; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">N</div>
                    <span class="logo-text">NBARankPro</span>
                </div>
                <nav class="nav-tabs">
                    <button class="nav-tab active" data-view="ranking">
                        <i data-lucide="trophy"></i>
                        总榜
                    </button>
                    <button class="nav-tab" data-view="position">
                        <i data-lucide="users"></i>
                        分位置
                    </button>
                    <button class="nav-tab" data-view="compare">
                        <i data-lucide="git-compare"></i>
                        对比
                    </button>
                    <button class="nav-tab" data-view="favorites">
                        <i data-lucide="heart"></i>
                        收藏
                    </button>
                </nav>
            </div>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">位置</span>
                <select class="filter-select" id="filter-position">
                    <option value="">全部位置</option>
                    <option value="PG">控卫 PG</option>
                    <option value="SG">分卫 SG</option>
                    <option value="SF">小前 SF</option>
                    <option value="PF">大前 PF</option>
                    <option value="C">中锋 C</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">球队</span>
                <select class="filter-select" id="filter-team">
                    <option value="">全部球队</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">年龄段</span>
                <select class="filter-select" id="filter-age">
                    <option value="">全部年龄</option>
                    <option value="under25">25岁以下</option>
                    <option value="26-30">26-30岁</option>
                    <option value="over31">31岁以上</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">排序</span>
                <select class="filter-select" id="filter-sort">
                    <option value="overall">综合评分</option>
                    <option value="offense">进攻能力</option>
                    <option value="defense">防守能力</option>
                    <option value="playmaking">组织能力</option>
                </select>
            </div>
            <div class="filter-actions">
                <button class="btn btn-secondary" id="btn-weights">
                    <i data-lucide="sliders"></i>
                    权重设置
                </button>
                <button class="btn btn-primary" id="btn-compare">
                    <i data-lucide="git-compare"></i>
                    开始对比
                </button>
            </div>
        </div>

        <div id="player-list" class="player-list"></div>

        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-state-icon">🔍</div>
            <p class="empty-state-text">没有找到符合条件的球员</p>
            <button class="btn btn-secondary" onclick="clearFilters()">清除筛选</button>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="detail-title">球员详情</h2>
                <button class="modal-close" onclick="closeModal('detail-modal')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="detail-body"></div>
        </div>
    </div>

    <!-- Weight Modal -->
    <div class="modal-overlay" id="weight-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">自定义权重</h2>
                <button class="modal-close" onclick="closeModal('weight-modal')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="weight-presets">
                    <button class="preset-btn active" data-preset="balanced">均衡型</button>
                    <button class="preset-btn" data-preset="offense">进攻优先</button>
                    <button class="preset-btn" data-preset="defense">防守优先</button>
                    <button class="preset-btn" data-preset="playmaking">组织优先</button>
                </div>
                <div class="weight-section">
                    <div class="weight-grid" id="weight-grid"></div>
                </div>
                <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="btn btn-secondary" onclick="resetWeights()">重置</button>
                    <button class="btn btn-primary" onclick="applyWeights()">应用</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Compare Modal -->
    <div class="modal-overlay" id="compare-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">球员对比</h2>
                <button class="modal-close" onclick="closeModal('compare-modal')">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="compare-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon"><i data-lucide="check-circle"></i></span>
        <span id="toast-message">操作成功</span>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
